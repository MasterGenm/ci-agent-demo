name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov
      - name: Run tests with coverage
        env:
          TAVILY_API_KEY: dummy-for-test
          OPENAI_API_KEY: dummy-for-test
        run: pytest tests/ -q --cov=cs_mvp --cov-report=xml --cov-report=term --cov-fail-under=70

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install e2e dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-playwright pytest-cov httpx
          playwright install --with-deps chromium
      - name: Run e2e
        env:
          TAVILY_API_KEY: dummy-for-e2e
          OPENAI_API_KEY: dummy-for-e2e
        run: pytest tests/e2e/ -v --tb=short
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshots
          path: test-results/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install ruff mypy
      - name: Run ruff check
        run: ruff check cs_mvp/ tests/ --output-format=github
        continue-on-error: true
      - name: Run ruff format check
        run: ruff format --check cs_mvp/ tests/
        continue-on-error: true
      - name: Run mypy partial
        run: mypy cs_mvp/observability cs_mvp/agents/role_card.py cs_mvp/agents/role_cards cs_mvp/prompts/families --ignore-missing-imports
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t cs-mvp:ci .
