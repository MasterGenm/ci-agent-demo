<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 1280px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #f8fafc;
      color: #1e293b;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }
    header {
      height: 64px;
      padding: 0 70px;
      background: #1e3a8a;
      color: #ffffff;
      display: flex;
      align-items: center;
      font-size: 25px;
      font-weight: 800;
    }
    .bar { height: 4px; background: #6366f1; }
    main { padding: 34px 70px; }
    .cards {
      display: grid;
      grid-template-rows: repeat(5, 1fr);
      gap: 12px;
    }
    .card {
      min-height: 96px;
      background: #ffffff;
      border-left: 5px solid #6366f1;
      border-radius: 8px;
      padding: 14px 18px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 14px;
      align-items: start;
    }
    .num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #6366f1;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
    }
    .meta {
      display: inline-block;
      margin-bottom: 7px;
      padding: 3px 10px;
      border-radius: 5px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
    }
    .text {
      font-size: 18px;
      line-height: 1.38;
      max-height: 50px;
      overflow: hidden;
    }
    .empty {
      margin-top: 140px;
      text-align: center;
      color: #64748b;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <header>核心结论</header>
  <div class="bar"></div>
  <main>
    {% if findings %}
    <section class="cards">
      {% for item in findings %}
      <article class="card">
        <div class="num">{{ item.index }}</div>
        <div>
          <div class="meta">{{ item.competitor|e }} · {{ item.dimension|e }}</div>
          <div class="text">{{ item.statement|e }}</div>
        </div>
      </article>
      {% endfor %}
    </section>
    {% else %}
    <div class="empty">暂无 accepted claims</div>
    {% endif %}
  </main>
</body>
</html>
