<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 1280px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #f8fafc;
      color: #1e293b;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }
    header {
      height: 64px;
      padding: 0 70px;
      background: #1e3a8a;
      color: #ffffff;
      display: flex;
      align-items: center;
      font-size: 25px;
      font-weight: 800;
    }
    main { padding: 36px 64px; }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
    }
    th {
      background: #1e3a8a;
      color: #ffffff;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 800;
      padding: 14px 12px;
      border-right: 1px solid rgba(255,255,255,0.16);
    }
    th:first-child { width: 150px; }
    td {
      height: 102px;
      vertical-align: top;
      padding: 13px 12px;
      font-size: 14px;
      line-height: 1.38;
      border-right: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
      overflow: hidden;
    }
    tbody tr:nth-child(even) td { background: #f8fafc; }
    .dim {
      background: #eff6ff !important;
      color: #1e3a8a;
      font-size: 15px;
      font-weight: 800;
    }
    .missing {
      color: #94a3b8;
      text-align: center;
      font-size: 22px;
      padding-top: 34px;
    }
  </style>
</head>
<body>
  <header>横向对比矩阵</header>
  <main>
    <table>
      <thead>
        <tr>
          <th>维度</th>
          {% for competitor in competitors %}
          <th>{{ competitor|e }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          <td class="dim">{{ row.dimension|e }}</td>
          {% for value in row.cells %}
          {% if value == "—" %}
          <td class="missing">—</td>
          {% else %}
          <td>{{ value|e }}</td>
          {% endif %}
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </main>
</body>
</html>
